name: Qodana
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 1 1,7 *'  # Runs on January 1st and July 1st

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate coverage
        run: |
          npx jest --coverage --bail=false --runInBand --testPathIgnorePatterns="tests/api-tests|packages/fields-document|tests/admin-ui-tests|tests/examples-smoke-tests|tests2" || true
          mkdir -p .qodana/code-coverage
          cp coverage/lcov.info .qodana/code-coverage/ 2>/dev/null || true

      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2026.1
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
